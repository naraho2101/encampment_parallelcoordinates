<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Top 20 Encampment Sites</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: transparent;
      color: #ffffff;
    }
    main {
      max-width: 1100px;
      margin: 0 auto;
    }
    #pc-container {
      position: relative;
      width: 100%;
    }
    #pc-svg {
      width: 100%;
      height: auto;
      display: block;
    }
    #pc-tooltip {
      position: absolute;
      pointer-events: none;
      background: rgba(20, 20, 18, 0.95);
      color: #ffffff;
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 12px;
      line-height: 1.5;
      opacity: 0;
      transition: opacity 0.15s;
      max-width: 260px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 10;
    }
    #pc-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 14px;
      margin-top: 16px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.65);
    }
  </style>
</head>
<body>
  <main>
    <div id="pc-container">
      <svg id="pc-svg" viewBox="0 0 900 480" role="img" aria-label="Parallel coordinates chart showing the distance from each of the top 20 encampment sites to four utility types."></svg>
      <div id="pc-tooltip"></div>
    </div>
    <div id="pc-legend"></div>
  </main>

  <script>
    // Distances stored in METERS (source data); converted to US units for display.
    const sites = [
      { rank: 1,  label: "Capitol Hill — Boylston Ave E",       reports: 1322, Transit: 161, Food: 230, Park: 13,  Shelter: 773  },
      { rank: 2,  label: "Olympic Hills — Lake City Way NE",    reports: 1286, Transit: 28,  Food: 148, Park: 0,   Shelter: 505  },
      { rank: 3,  label: "Capitol Hill — Federal Ave E",        reports: 1104, Transit: 127, Food: 115, Park: 367, Shelter: 861  },
      { rank: 4,  label: "Belltown — 2nd Ave",                  reports: 1035, Transit: 88,  Food: 155, Park: 223, Shelter: 143  },
      { rank: 5,  label: "Greenwood — N 87th St",               reports: 821,  Transit: 173, Food: 545, Park: 328, Shelter: 3270 },
      { rank: 6,  label: "Capitol Hill — University St",        reports: 807,  Transit: 78,  Food: 262, Park: 5,   Shelter: 573  },
      { rank: 7,  label: "North Delridge — 35th Ave SW",        reports: 766,  Transit: 94,  Food: 833, Park: 86,  Shelter: 4443 },
      { rank: 8,  label: "Olympic Hills — 27th Ave NE",         reports: 681,  Transit: 83,  Food: 54,  Park: 12,  Shelter: 731  },
      { rank: 9,  label: "Ballard — NW 50th St",                reports: 667,  Transit: 112, Food: 369, Park: 557, Shelter: 217  },
      { rank: 10, label: "Capitol Hill — Summit Ave E",         reports: 592,  Transit: 49,  Food: 448, Park: 21,  Shelter: 304  },
      { rank: 11, label: "Central Area — E Howell St",          reports: 591,  Transit: 85,  Food: 259, Park: 60,  Shelter: 1003 },
      { rank: 12, label: "Ballard — 22nd Ave NW",               reports: 578,  Transit: 144, Food: 105, Park: 12,  Shelter: 588  },
      { rank: 13, label: "Ballard — 8th Ave NW",                reports: 555,  Transit: 120, Food: 746, Park: 392, Shelter: 1293 },
      { rank: 14, label: "Capitol Hill — Bellevue Ave E",       reports: 508,  Transit: 57,  Food: 445, Park: 1,   Shelter: 443  },
      { rank: 15, label: "Queen Anne — Roy St",                 reports: 500,  Transit: 83,  Food: 665, Park: 242, Shelter: 748  },
      { rank: 16, label: "North Beacon Hill — Sturgus Ave S",   reports: 465,  Transit: 206, Food: 487, Park: 12,  Shelter: 632  },
      { rank: 17, label: "Whittier Heights — Mary Ave NW",      reports: 458,  Transit: 82,  Food: 564, Park: 42,  Shelter: 2577 },
      { rank: 18, label: "Pioneer Square — S Main St",          reports: 406,  Transit: 143, Food: 177, Park: 147, Shelter: 410  },
      { rank: 19, label: "Queen Anne — Queen Anne Ave N",       reports: 400,  Transit: 62,  Food: 404, Park: 246, Shelter: 84   },
      { rank: 20, label: "Queen Anne — Roy St (E)",             reports: 394,  Transit: 100, Food: 589, Park: 3,   Shelter: 260  },
    ];

    const axes = ["Transit", "Food", "Park", "Shelter"];

    const M_PER_FT = 0.3048;
    const M_PER_MI = 1609.344;

    function formatDistance(meters) {
      const miles = meters / M_PER_MI;
      if (miles < 0.2) {
        return `${Math.round((meters / M_PER_FT) / 10) * 10} ft`;
      }
      return `${miles.toFixed(1)} mi`;
    }

    const W = 900, H = 480;
    const margin = { top: 40, right: 60, bottom: 60, left: 70 };
    const innerW = W - margin.left - margin.right;
    const innerH = H - margin.top - margin.bottom;

    const maxVal = 4500;
    function yScale(v) {
      return margin.top + innerH - (Math.sqrt(v) / Math.sqrt(maxVal)) * innerH;
    }
    function xScale(i) {
      return margin.left + (i / (axes.length - 1)) * innerW;
    }

    function colorFor(rank) {
      const t = (rank - 1) / 19;
      const start = [235, 69, 14];
      const end   = [255, 179, 148];
      const c = start.map((s, i) => Math.round(s + (end[i] - s) * t));
      return `rgb(${c[0]}, ${c[1]}, ${c[2]})`;
    }

    const svg = document.getElementById("pc-svg");
    const NS = "http://www.w3.org/2000/svg";

    const tickValuesMeters = [0, 76.2, 152.4, 304.8, 402.336, 804.672, 1609.344, 3218.688];

    axes.forEach((axis, i) => {
      const x = xScale(i);

      const line = document.createElementNS(NS, "line");
      line.setAttribute("x1", x); line.setAttribute("x2", x);
      line.setAttribute("y1", margin.top); line.setAttribute("y2", margin.top + innerH);
      line.setAttribute("stroke", "rgba(255, 255, 255, 0.35)");
      line.setAttribute("stroke-width", 1);
      svg.appendChild(line);

      tickValuesMeters.forEach(v => {
        const y = yScale(v);
        const tick = document.createElementNS(NS, "line");
        tick.setAttribute("x1", x - 4); tick.setAttribute("x2", x + 4);
        tick.setAttribute("y1", y); tick.setAttribute("y2", y);
        tick.setAttribute("stroke", "rgba(255, 255, 255, 0.55)");
        tick.setAttribute("stroke-width", 1);
        svg.appendChild(tick);

        if (i === 0) {
          const txt = document.createElementNS(NS, "text");
          txt.setAttribute("x", x - 10);
          txt.setAttribute("y", y + 4);
          txt.setAttribute("text-anchor", "end");
          txt.setAttribute("font-size", "10");
          txt.setAttribute("fill", "rgba(255, 255, 255, 0.75)");
          txt.textContent = formatDistance(v);
          svg.appendChild(txt);
        }
      });

      const title = document.createElementNS(NS, "text");
      title.setAttribute("x", x);
      title.setAttribute("y", margin.top - 14);
      title.setAttribute("text-anchor", "middle");
      title.setAttribute("font-size", "13");
      title.setAttribute("font-weight", "500");
      title.setAttribute("fill", "#ffffff");
      title.textContent = axis;
      svg.appendChild(title);
    });

    const tooltip = document.getElementById("pc-tooltip");
    const container = document.getElementById("pc-container");
    let selectedRank = null;

    function buildTooltipHTML(site) {
      return `<div style="font-weight:600;margin-bottom:4px;color:#ffffff;">#${site.rank}. ${site.label}</div>
        <div style="opacity:0.75;margin-bottom:6px;">${site.reports.toLocaleString()} reports</div>
        ${axes.map(a => {
          const v = site[a];
          return `<div>${a}: <span style="font-variant-numeric:tabular-nums;">${formatDistance(v)}</span></div>`;
        }).join("")}`;
    }

    // Convert an SVG-coordinate point to a pixel position inside the container
    function svgPointToContainer(svgX, svgY) {
      const svgRect = svg.getBoundingClientRect();
      const containerRect = container.getBoundingClientRect();
      const scaleX = svgRect.width / W;
      const scaleY = svgRect.height / H;
      return {
        x: (svgRect.left - containerRect.left) + svgX * scaleX,
        y: (svgRect.top - containerRect.top) + svgY * scaleY,
      };
    }

    // Position tooltip near a chosen anchor on the line, keeping it inside the container
    function positionTooltipAtSite(site) {
      // Anchor at the line's first point (Transit axis), but offset to the right
      const anchorSvgX = xScale(0);
      const anchorSvgY = yScale(site[axes[0]]);
      const { x, y } = svgPointToContainer(anchorSvgX, anchorSvgY);

      // Show first to measure
      tooltip.style.opacity = 1;
      const tipRect = tooltip.getBoundingClientRect();
      const containerRect = container.getBoundingClientRect();

      // Default: place to the right of the anchor
      let tipX = x + 16;
      let tipY = y - tipRect.height / 2;

      // Clamp to container bounds
      const maxX = containerRect.width - tipRect.width - 8;
      if (tipX > maxX) tipX = Math.max(8, x - tipRect.width - 16); // flip left
      if (tipY < 8) tipY = 8;
      const maxY = containerRect.height - tipRect.height - 8;
      if (tipY > maxY) tipY = maxY;

      tooltip.style.left = tipX + "px";
      tooltip.style.top  = tipY + "px";
    }

    const linePaths = [];

    // Two-pass approach so all visible lines render before the invisible hit areas,
    // but hit areas sit on top to catch clicks/hovers anywhere within ~14px of the line.
    const visiblePaths = [];
    const lineData = [];

    sites.forEach(site => {
      const points = axes.map((a, i) => [xScale(i), yScale(site[a])]);
      const d = "M " + points.map(p => p.join(",")).join(" L ");

      const path = document.createElementNS(NS, "path");
      path.setAttribute("d", d);
      path.setAttribute("fill", "none");
      path.setAttribute("stroke", colorFor(site.rank));
      path.setAttribute("stroke-width", 2);
      path.setAttribute("stroke-opacity", 0.7);
      path.setAttribute("stroke-linecap", "round");
      path.setAttribute("stroke-linejoin", "round");
      path.style.transition = "stroke-width 0.15s, stroke-opacity 0.15s";
      path.style.pointerEvents = "none"; // hit area handles all input
      path.dataset.rank = site.rank;
      svg.appendChild(path);
      visiblePaths.push(path);
      linePaths.push(path);
      lineData.push({ site, d });
    });

    // Hit areas — invisible thick strokes drawn on top, capture all pointer events
    lineData.forEach(({ site, d }) => {
      const hit = document.createElementNS(NS, "path");
      hit.setAttribute("d", d);
      hit.setAttribute("fill", "none");
      hit.setAttribute("stroke", "transparent");
      hit.setAttribute("stroke-width", 28); // wide click target
      hit.setAttribute("stroke-linecap", "round");
      hit.setAttribute("stroke-linejoin", "round");
      hit.style.cursor = "pointer";
      hit.dataset.rank = site.rank;
      svg.appendChild(hit);

      // Reference to this site's visible path
      const visible = visiblePaths.find(p => parseInt(p.dataset.rank) === site.rank);

      hit.addEventListener("mouseenter", () => {
        if (selectedRank !== null) return;
        visible.setAttribute("stroke-width", 3.5);
        visible.setAttribute("stroke-opacity", 1);
        tooltip.innerHTML = buildTooltipHTML(site);
        tooltip.style.opacity = 1;
      });
      hit.addEventListener("mousemove", (e) => {
        if (selectedRank !== null) return;
        const rect = container.getBoundingClientRect();
        const x = e.clientX - rect.left + 14;
        const y = e.clientY - rect.top + 14;
        const tipRect = tooltip.getBoundingClientRect();
        const maxX = rect.width - tipRect.width - 8;
        tooltip.style.left = Math.min(x, maxX) + "px";
        tooltip.style.top  = y + "px";
      });
      hit.addEventListener("mouseleave", () => {
        if (selectedRank !== null) return;
        visible.setAttribute("stroke-width", 2);
        visible.setAttribute("stroke-opacity", 0.7);
        tooltip.style.opacity = 0;
      });

      hit.addEventListener("click", (e) => {
        e.stopPropagation();
        if (selectedRank === site.rank) {
          selectedRank = null;
          visiblePaths.forEach(p => {
            p.setAttribute("stroke-width", 2);
            p.setAttribute("stroke-opacity", 0.7);
          });
          tooltip.style.opacity = 0;
        } else {
          selectedRank = site.rank;
          visiblePaths.forEach(p => {
            const r = parseInt(p.dataset.rank);
            if (r === selectedRank) {
              p.setAttribute("stroke-width", 3.5);
              p.setAttribute("stroke-opacity", 1);
            } else {
              p.setAttribute("stroke-width", 2);
              p.setAttribute("stroke-opacity", 0.12);
            }
          });
          tooltip.innerHTML = buildTooltipHTML(site);
          positionTooltipAtSite(site);
        }
      });
    });

    // Clicking empty space (anywhere outside a line) deselects
    svg.addEventListener("click", () => {
      if (selectedRank === null) return;
      selectedRank = null;
      linePaths.forEach(p => {
        p.setAttribute("stroke-width", 2);
        p.setAttribute("stroke-opacity", 0.7);
      });
      tooltip.style.opacity = 0;
    });

    // Reposition pinned tooltip on resize
    window.addEventListener("resize", () => {
      if (selectedRank === null) return;
      const site = sites.find(s => s.rank === selectedRank);
      if (site) positionTooltipAtSite(site);
    });

    const legend = document.getElementById("pc-legend");
    legend.innerHTML = '<div style="width:100%;margin-bottom:4px;">Color = ranking (more vivid = more reports). Click any line to isolate it.</div>';
    const gradientBar = document.createElement("div");
    gradientBar.style.cssText = "display:flex;align-items:center;gap:8px;";
    gradientBar.innerHTML = `
      <span>#1</span>
      <div style="width:160px;height:10px;border-radius:2px;background:linear-gradient(to right, #EB450E, #FFB394);"></div>
      <span>#20</span>
    `;
    legend.appendChild(gradientBar);
  </script>
</body>
</html>
